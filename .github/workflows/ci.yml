name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  php-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql, mbstring, json

      - name: Lint PHP files
        run: find . -name '*.php' -not -path './vendor/*' -print0 | xargs -0 -n1 php -l
